name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            if (!body.includes("## Description")) {
              core.setFailed("Missing Description section.");
            }

            if (!body.includes("## Checklist")) {
              core.setFailed("Missing Checklist section.");
            }

      - name: Check checklist completion
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            if (body.match(/- \[ \]/g)) {
              core.setFailed("Checklist not completed.");
            }

      - name: Validate group folder changes
        run: |
          files=$(git diff --name-only origin/main)

          echo "Changed files:"
          echo "$files"

          group=$(echo "$files" | grep -o 'groups/group-[0-9]\+' | head -n 1)

          if [ -z "$group" ]; then
            echo "No group folder detected!"
            exit 1
          fi

          invalid=$(echo "$files" | grep -v "$group")

          if [ ! -z "$invalid" ]; then
            echo "You modified files outside your group folder!"
            exit 1
          fi
