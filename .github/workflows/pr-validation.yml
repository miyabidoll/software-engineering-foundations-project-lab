name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Validate PR description
      # ----------------------------
      - name: Validate PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            if (!body.includes("## Description")) {
              core.setFailed("Missing '## Description'");
            }

            if (!body.includes("## Checklist")) {
              core.setFailed("Missing '## Checklist'");
            }

            if (!body.includes("## Related Issue")) {
              core.setFailed("Missing '## Related Issue'");
            }

      # ----------------------------
      # Validate checklist
      # ----------------------------
      - name: Validate checklist
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const unchecked = body.match(/- \[ \]/g);

            if (unchecked) {
              core.setFailed("Checklist not completed");
            }

      # ----------------------------
      # Validate branch name
      # ----------------------------
      - name: Validate branch name
        run: |
          branch="${{ github.head_ref }}"

          if [[ ! "$branch" =~ ^group-[0-9]+-.*$ ]]; then
            echo "Branch must be: group-XX-description"
            exit 1
          fi

      # ----------------------------
      # Validate group folder
      # ----------------------------
      - name: Validate changed files location
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr
              }
            );

            const paths = files.map(f => f.filename);

            console.log("Files:", paths);

            const groupFolder = paths.find(p => p.startsWith("groups/group-"));

            if (!groupFolder) {
              core.setFailed("Files must be inside groups/group-XX/");
            }

            const baseFolder = groupFolder.split('/').slice(0,2).join('/');

            const invalid = paths.filter(p => !p.startsWith(baseFolder));

            if (invalid.length > 0) {
              core.setFailed("Files outside group folder detected");
            }

      # ----------------------------
      # Validate file by stage
      # ----------------------------
      - name: Validate files by stage
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr
              }
            );

            const paths = files.map(f => f.filename);

            console.log("Branch:", branch);
            console.log("Files:", paths);

            let valid = false;
            let stageDetected = false;

            // -----------------------------------
            // PRODUCT VISION
            // -----------------------------------
            if (branch.includes("product-vision")) {
              stageDetected = true;

              valid = paths.some(p =>
                p.endsWith("product-vision.md")
              );
            }

            // -----------------------------------
            // REQUIREMENTS
            // -----------------------------------
            else if (branch.includes("requirements")) {
              stageDetected = true;

              valid = paths.some(p =>
                p.endsWith("requirementsPart1.md") ||
                p.endsWith("requirementsPart2.md") ||
                p.endsWith("requirementsPart3.md") ||
                p.endsWith("Documento_de_Requisitos_Versao-Final.md")
              );
            }

            // -----------------------------------
            // MODELING
            // -----------------------------------
            else if (branch.includes("modeling")) {
              stageDetected = true;

              valid = paths.some(p =>
                p.endsWith("modeling.md") ||
                p.endsWith("Documento_de_Requisitos_Versao-Final.md")
              );
            }

            // -----------------------------------
            // ARCHITECTURE
            // -----------------------------------
            else if (branch.includes("architecture")) {
              stageDetected = true;

              valid = paths.some(p =>
                p.endsWith("architecture.md") ||
                p.endsWith("Documento_de_Requisitos_Versao-Final.md")
              );
            }

            // -----------------------------------
            // TESTING
            // -----------------------------------
            else if (branch.includes("testing")) {
              stageDetected = true;

              valid = paths.some(p =>
                p.endsWith("testing.md") ||
                p.endsWith("Documento_de_Requisitos_Versao-Final.md")
              );
            }

            // -----------------------------------
            // INTELLECTUAL PROPERTY / INNOVATION
            // -----------------------------------
            else if (
              branch.includes("innovation") ||
              branch.includes("intellectual-property") ||
              branch.includes("-ip")
            ) {
              stageDetected = true;

              valid = paths.some(p =>
                p.endsWith("innovation-record.md") ||
                p.endsWith("prior-art-analysis.md") ||
                p.endsWith("authors-and-contributions.md")
              );
            }

            // -----------------------------------
            // FINAL VALIDATION
            // -----------------------------------
            if (stageDetected && !valid) {
              core.setFailed(
                "Invalid file for this stage. Check naming and structure."
              );
            } else {
              console.log("Validation passed.");
            }
